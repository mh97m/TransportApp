name: Deploy Laravel Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install PHP Dependencies
      run: composer install --prefer-dist # --no-dev 

    - name: Generate Application Key
      run: php artisan key:generate

    - name: Set Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Setup SQLite Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run Migrations and Seeders
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan migrate --seed

    - name: Set Up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: "18"

    - name: Install Node Dependencies
      run: npm install

    - name: Build Frontend Assets
      run: npm run build

    - name: Copy Frontend Files
      run: |
        mkdir public-deploy
        cp -R public/* public-deploy/
        touch public-deploy/.nojekyll

    - name: Debug Deployment Directory
      run: ls -la public-deploy

    - name: Set Git Remote and Configure Git
      run: |
        git init
        git remote add origin https://github.com/${{ github.repository }}.git
        git fetch --unshallow
        git checkout --orphan gh-pages
        git config user.name "mh97m"
        git config user.email "mh97m@users.noreply.github.com"

    - name: Commit Changes
      run: |
        git add --all
        git commit -m "Deploy to GitHub Pages"
        git push -f origin gh-pages

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public-deploy
        force_orphan: true
